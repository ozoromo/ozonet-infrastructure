name: OpenTofu Apply

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  apply:
    name: tofu apply
    runs-on: ubuntu-latest
    environment: main
    concurrency:
      group: tofu-apply
      cancel-in-progress: false
    env:
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"
          tofu_wrapper: false

      - name: tofu init
        run: tofu init

      - name: tofu validate
        run: tofu validate -no-color

      - name: tofu apply
        id: apply
        run: tofu apply -auto-approve -no-color

      - name: Summary
        if: always()
        run: |
          {
            echo "### OpenTofu apply \`${{ steps.apply.outcome }}\`"
            echo ""
            echo "Ref: \`${{ github.event.release.tag_name || github.ref_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
